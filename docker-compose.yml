services:
  postgres:
    image: postgres:16-alpine
    container_name: fine_enterprises_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fine_enterprises
    ports:
      - "5432:5432"
    volumes:
      - fine_enterprises_pg:/var/lib/postgresql/data

volumes:
  fine_enterprises_pg:
